{% extends 'base.html' %}
{% block title %}Change Password — Shopkart{% endblock %}

{% block content %}
<div class="container py-4" style="max-width:480px;">
  <div class="card border-0 shadow-sm">
    <div class="card-header bg-white border-bottom">
      <h5 class="mb-0 fw-bold"><i class="bi bi-shield-lock me-2 text-fk"></i>Change Password</h5>
    </div>
    <div class="card-body p-4">
      <form method="POST" novalidate>
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
          <label class="form-label fw-500">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
            <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
          {% endif %}
        </div>
        {% endfor %}
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-fk-primary">
            <i class="bi bi-check-lg me-1"></i>Update Password
          </button>
          <a href="{% url 'users:profile' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
